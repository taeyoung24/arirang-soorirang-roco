name: Automated Version Bump & Release

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 push(또는 PR 머지)될 때만 작동합니다.

jobs:
  release:
    runs-on: ubuntu-latest
    
    # GITHUB_TOKEN이 태그와 릴리즈를 생성할 수 있도록 권한 부여
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 커밋 메시지를 분석해서 버전을 올리고 태그를 생성하는 액션
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch # 일반 커밋일 경우 기본적으로 patch(끝자리)를 올림
          release_branches: main

      # 2. 생성된 태그를 바탕으로 GitHub Releases 페이지에 릴리즈 노트를 작성하는 액션
      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
