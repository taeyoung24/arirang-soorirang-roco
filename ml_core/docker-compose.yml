services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mdd-api
    ports:
      - "8000:8000"
    environment:
      MDD_SERVICE_MODE: api
      MDD_WHISPER_MODEL: ${MDD_WHISPER_MODEL:-small}
      MDD_WHISPER_DEVICE: ${MDD_WHISPER_DEVICE:-cuda}
      MDD_WHISPER_COMPUTE_TYPE: ${MDD_WHISPER_COMPUTE_TYPE:-int8_float16}
      MDD_WHISPER_LANGUAGE: ${MDD_WHISPER_LANGUAGE:-ko}
      MDD_WHISPER_BEAM_SIZE: ${MDD_WHISPER_BEAM_SIZE:-5}
      HF_HOME: /opt/hf-cache
      MDD_ALIGNER_BASE_URL: http://aligner:8090
      MDD_ALIGNER_TIMEOUT_SECONDS: 120
      MDD_ALIGNER_LANGUAGE: Korean
      MDD_GEMINI_API_KEY: ${MDD_GEMINI_API_KEY:-}
      MDD_GEMINI_MODEL: ${MDD_GEMINI_MODEL:-gemini-2.5-flash}
      MDD_GEMINI_TIMEOUT_SECONDS: ${MDD_GEMINI_TIMEOUT_SECONDS:-30}
      MDD_OBJECT_STORAGE_ENABLED: ${MDD_OBJECT_STORAGE_ENABLED:-true}
      MDD_OBJECT_STORAGE_ENDPOINT: minio:9000
      MDD_OBJECT_STORAGE_ACCESS_KEY: ${MDD_OBJECT_STORAGE_ACCESS_KEY:-mddadmin}
      MDD_OBJECT_STORAGE_SECRET_KEY: ${MDD_OBJECT_STORAGE_SECRET_KEY:-mddadmin123}
      MDD_OBJECT_STORAGE_BUCKET: ${MDD_OBJECT_STORAGE_BUCKET:-mdd-reference-cache}
      MDD_OBJECT_STORAGE_SECURE: ${MDD_OBJECT_STORAGE_SECURE:-false}
      MDD_TTS_PROVIDER: ${MDD_TTS_PROVIDER:-edge}
      MDD_TTS_MODEL: ${MDD_TTS_MODEL:-edge-tts}
      MDD_TTS_VOICE_ID: ${MDD_TTS_VOICE_ID:-ko-KR-SunHiNeural}
      MDD_TTS_SPEAKING_RATE: ${MDD_TTS_SPEAKING_RATE:-1.0}
    volumes:
      - hf-cache:/opt/hf-cache
    runtime: nvidia
    depends_on:
      - aligner
      - minio
    restart: unless-stopped

  aligner:
    build:
      context: .
      dockerfile: Dockerfile.aligner
    container_name: mdd-aligner
    environment:
      MDD_SERVICE_MODE: aligner
      MDD_HOST: 0.0.0.0
      MDD_PORT: 8090
      MDD_ALIGNER_MODEL_ID: Qwen/Qwen3-ForcedAligner-0.6B
      HF_HOME: /opt/hf-cache
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - hf-cache:/opt/hf-cache
    runtime: nvidia
    ipc: host
    depends_on:
      hf-cache-downloader:
        condition: service_completed_successfully
    restart: unless-stopped

  hf-cache-downloader:
    build:
      context: .
      dockerfile: Dockerfile.aligner
    environment:
      HF_HOME: /opt/hf-cache
    volumes:
      - hf-cache:/opt/hf-cache
    command:
      - python
      - -c
      - "from huggingface_hub import snapshot_download; print(snapshot_download('Qwen/Qwen3-ForcedAligner-0.6B'))"

  minio:
    image: minio/minio:latest
    container_name: mdd-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MDD_OBJECT_STORAGE_ACCESS_KEY:-mddadmin}
      MINIO_ROOT_PASSWORD: ${MDD_OBJECT_STORAGE_SECRET_KEY:-mddadmin123}
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  minio-data:
  hf-cache:
    name: mdd-hf-cache
